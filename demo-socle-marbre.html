<!doctype html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Démo — Gâteau sur socle de marbre</title>
<style>
  :root { --cream:#f5f0e8; --ink:#1a1a1a; --gold:#c9a84c; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    min-height:100%;
    background:var(--cream);
    font-family:"DM Sans", system-ui, sans-serif;
    color:var(--ink);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:18px; padding:24px;
  }
  h1 { font-family:Georgia, serif; font-weight:700; font-size:20px; letter-spacing:.5px; }
  .hint { font-size:11px; letter-spacing:2px; text-transform:uppercase; color:#9e9e9e; }

  .scene {
    position:relative;
    width:min(92vw, 920px);
    height:min(70vh, 580px);
    background:var(--cream);
    overflow:hidden;
    border-radius:6px;
  }

  /* ---------- Dalle de marbre (bas de la scène) ---------- */
  .marble {
    position:absolute;
    left:0; right:0; bottom:0;
    height:42%;
    overflow:hidden;
  }
  .marble svg, .marble .marble-photo {
    position:absolute; inset:0; width:100%; height:100%;
  }
  .marble-photo { object-fit:cover; }
  /* arête avant polie : fine ligne de lumière sur le bord haut de la dalle */
  .marble::before {
    content:''; position:absolute; left:0; right:0; top:0; height:2px; z-index:3;
    background:linear-gradient(to right, transparent, rgba(255,255,255,.9), transparent);
  }
  /* reflet de lumière qui balaie le marbre poli */
  .sheen {
    position:absolute; top:0; bottom:0; width:40%; z-index:4; pointer-events:none;
    background:linear-gradient(105deg, transparent, rgba(255,255,255,.45), transparent);
    mix-blend-mode:screen; filter:blur(6px);
    animation:sweep 7s ease-in-out infinite;
  }
  @keyframes sweep {
    0%,100% { transform:translateX(-60%); opacity:0; }
    50%     { transform:translateX(260%); opacity:1; }
  }
  /* fondu du haut de la dalle vers le crème (aucune démarcation) */
  .marble::after {
    content:''; position:absolute; inset:0; z-index:2; pointer-events:none;
    background:linear-gradient(to bottom, var(--cream) 0%, transparent 14%, transparent 100%);
  }

  /* ---------- Gâteau + reflet ---------- */
  .cake-wrap {
    position:absolute; left:50%; bottom:38%;
    transform:translateX(-50%);
    width:min(46%, 380px); z-index:5;
  }
  .cake {
    display:block; width:100%; height:auto;
    /* le fond clair de la photo se fond dans le crème */
    mix-blend-mode:multiply;
  }
  /* ombre de contact sous le gâteau */
  .contact-shadow {
    position:absolute; left:50%; bottom:37.4%; transform:translateX(-50%);
    width:min(40%, 320px); height:26px; z-index:4;
    background:radial-gradient(ellipse at center, rgba(0,0,0,.32), transparent 70%);
    filter:blur(4px);
  }
  /* reflet miroir du gâteau dans le marbre */
  .cake-reflection {
    position:absolute; left:50%; bottom:38%;
    transform:translateX(-50%) scaleY(-1);
    transform-origin:bottom center;
    width:min(42%, 320px); z-index:4; pointer-events:none;
    opacity:.22; filter:blur(1px);
    -webkit-mask-image:linear-gradient(to bottom, rgba(0,0,0,.9), transparent 55%);
            mask-image:linear-gradient(to bottom, rgba(0,0,0,.9), transparent 55%);
    mix-blend-mode:multiply;
  }

  .controls { display:flex; gap:10px; align-items:center; }
  button {
    font:inherit; font-size:12px; letter-spacing:1px; text-transform:uppercase;
    padding:10px 18px; border:1.5px solid var(--ink); background:transparent;
    color:var(--ink); border-radius:4px; cursor:pointer; transition:all .2s ease;
  }
  button:hover { background:var(--ink); color:var(--cream); }
</style>
</head>
<body>
  <h1>Gâteau sur socle de marbre — démo</h1>

  <div class="scene">
    <!-- Dalle de marbre -->
    <div class="marble">
      <!-- Marbre dessiné (fallback Calacatta : veines or/taupe sur blanc) -->
      <svg viewBox="0 0 1000 420" preserveAspectRatio="xMidYMid slice">
        <defs>
          <linearGradient id="slab" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#fdfdfb"/>
            <stop offset="100%" stop-color="#efece6"/>
          </linearGradient>
          <filter id="soft"><feGaussianBlur stdDeviation="2.4"/></filter>
          <filter id="mottle" x="0" y="0" width="100%" height="100%">
            <feTurbulence type="fractalNoise" baseFrequency="0.012 0.02" numOctaves="4" seed="9" result="n"/>
            <feColorMatrix in="n" type="saturate" values="0"/>
          </filter>
        </defs>

        <rect width="1000" height="420" fill="url(#slab)"/>
        <rect width="1000" height="420" fill="#ffffff" filter="url(#mottle)" opacity="0.06"/>

        <!-- veines taupe (douces, larges) -->
        <g filter="url(#soft)" fill="none" stroke="#a4917c" stroke-opacity="0.55">
          <path d="M-20,150 C160,110 250,210 430,170 S720,90 1020,160" stroke-width="9"/>
          <path d="M-20,300 C200,270 320,360 540,300 S840,360 1020,290" stroke-width="7"/>
          <path d="M430,170 C470,230 440,300 520,360" stroke-width="5"/>
          <path d="M150,40 C220,120 180,200 300,250" stroke-width="4"/>
        </g>

        <!-- fins traits dorés le long des veines -->
        <g fill="none" stroke="#b8954d" stroke-opacity="0.8" stroke-linecap="round">
          <path d="M-20,150 C160,110 250,210 430,170 S720,90 1020,160" stroke-width="1.6"/>
          <path d="M-20,300 C200,270 320,360 540,300 S840,360 1020,290" stroke-width="1.3"/>
          <path d="M430,170 C470,230 440,300 520,360" stroke-width="1"/>
          <path d="M620,30 C660,120 700,150 760,260" stroke-width="1.1"/>
        </g>

        <!-- hairlines grises secondaires -->
        <g fill="none" stroke="#cfc8bf" stroke-opacity="0.7">
          <path d="M80,360 C160,300 140,240 240,210" stroke-width="0.9"/>
          <path d="M780,400 C820,320 880,300 940,220" stroke-width="0.9"/>
        </g>
      </svg>

      <!-- Ta vraie photo : si public/marbre.png existe, elle recouvre le fallback -->
      <img class="marble-photo" src="public/marbre.png" alt="" onerror="this.style.display='none'">

      <div class="sheen"></div>
    </div>

    <!-- Reflet miroir + ombre + gâteau -->
    <img class="cake-reflection" src="public/miriam2.png.png" alt="" onerror="this.style.display='none'">
    <div class="contact-shadow"></div>
    <img class="cake" id="cake" src="public/miriam2.png.png" alt="Gâteau BEL ÂGE"
         onerror="this.style.display='none'">
    <div class="cake-wrap" id="cakeWrap" style="display:none;"></div>
  </div>

  <div class="controls">
    <span class="hint">Le reflet miroir et le balayage de lumière sont automatiques</span>
  </div>

<script>
  // Place le gâteau pour qu'il "pose" pile sur l'arête de la dalle.
  // (géré en CSS ; ce script ajuste juste si l'image charge en taille variable)
  const cake = document.getElementById('cake');
  function place() {
    const scene = cake.closest('.scene');
    const w = Math.min(scene.clientWidth * 0.42, 320);
    cake.style.width = w + 'px';
    cake.style.position = 'absolute';
    cake.style.left = '50%';
    cake.style.bottom = '38%';
    cake.style.transform = 'translateX(-50%)';
    cake.style.zIndex = 5;
    const refl = document.querySelector('.cake-reflection');
    if (refl) refl.style.width = w + 'px';
  }
  cake.complete ? place() : cake.addEventListener('load', place);
  window.addEventListener('resize', place);
</script>
</body>
</html>
